name: Khoj CI/CD Pipeline

on:
  push:
    branches: [ main ]      # runs every time you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1 — Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 — Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3 — Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4 — Build your Docker image and push to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_BACKEND_ENDPOINT=${{ secrets.VITE_BACKEND_ENDPOINT }}
          tags: ${{ secrets.DOCKER_USERNAME }}/khoj:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5 — Deploy to Railway
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service khoj-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
